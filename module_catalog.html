<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전자 카탈로그 — SMT·건웅</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<style>
body { background: #2c2c2c; margin: 0; overflow: hidden; }

.top-bar {
  position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
  color: white; padding: 10px 16px; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
}
.top-bar a { color: white; text-decoration: none; font-size: 14px; }
.top-bar .title { font-weight: 600; font-size: 16px; }
.top-bar .page-info { font-size: 13px; opacity: 0.8; }

.viewer {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 60px 20px 80px;
}
.viewer img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  background: white;
  cursor: zoom-in;
}
.viewer img.zoomed { cursor: zoom-out; max-width: none; max-height: none; transform: scale(2); }

.nav-btn {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.15); color: white; border: none;
  width: 56px; height: 80px; font-size: 28px; cursor: pointer;
  z-index: 50; border-radius: 8px;
}
.nav-btn:hover { background: rgba(255,255,255,0.3); }
.nav-btn.left { left: 12px; }
.nav-btn.right { right: 12px; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
  padding: 10px 16px; z-index: 100;
  display: flex; gap: 8px; align-items: center; justify-content: center;
}
.bottom-bar input[type="number"] {
  width: 60px; padding: 6px; border-radius: 4px; border: 1px solid #555;
  background: #333; color: white; text-align: center;
}
.bottom-bar select {
  padding: 6px 10px; border-radius: 4px; border: 1px solid #555;
  background: #333; color: white;
}
.bottom-bar .btn { background: var(--c-smt); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.bottom-bar .btn-search { background: var(--c-ok); }

.loading {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white;
  display: flex; align-items: center; justify-content: center;
  z-index: 200; display: none;
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <a href="index.html">🏠 홈</a> · <a href="module_order.html">📦 주문 처리</a>
  </div>
  <div class="title">📖 SMT·건웅 전자 카탈로그</div>
  <div class="page-info"><span id="cur-page">표지</span> / <span id="total-page">44</span></div>
</div>

<button class="nav-btn left" id="prev-btn" onclick="goPrev()">‹</button>
<button class="nav-btn right" id="next-btn" onclick="goNext()">›</button>

<div class="viewer">
  <img id="catalog-img" src="catalog/cover.jpg" alt="표지" onclick="toggleZoom(this)">
</div>

<div class="bottom-bar">
  <button class="btn" onclick="goPage(0)">표지</button>
  페이지
  <input type="number" id="page-input" min="1" max="44" value="0" onchange="goPage(this.value)">
  / 44
  <button class="btn btn-search" onclick="goToOrder()">🔍 주문 화면으로</button>
</div>

<div class="loading" id="loading">로딩 중...</div>

<script>
const TOTAL = 44;
let currentPage = 0;  // 0 = 표지

function updateImage() {
  const img = document.getElementById('catalog-img');
  const src = currentPage === 0 ? 'catalog/cover.jpg' : `catalog/p${currentPage}.jpg`;
  document.getElementById('loading').style.display = 'flex';
  img.classList.remove('zoomed');
  img.onload = () => {
    document.getElementById('loading').style.display = 'none';
  };
  img.onerror = () => {
    document.getElementById('loading').style.display = 'none';
    img.alt = `${currentPage}페이지 (이미지 없음)`;
  };
  img.src = src;
  img.alt = currentPage === 0 ? '표지' : `${currentPage}페이지`;
  
  document.getElementById('cur-page').textContent = currentPage === 0 ? '표지' : `${currentPage}p`;
  document.getElementById('page-input').value = currentPage;
  document.getElementById('prev-btn').disabled = (currentPage === 0);
  document.getElementById('next-btn').disabled = (currentPage === TOTAL);
}

function goPrev() { if (currentPage > 0) { currentPage--; updateImage(); } }
function goNext() { if (currentPage < TOTAL) { currentPage++; updateImage(); } }
function goPage(n) { 
  n = parseInt(n) || 0;
  n = Math.max(0, Math.min(TOTAL, n));
  currentPage = n;
  updateImage();
}

function toggleZoom(img) { img.classList.toggle('zoomed'); }

function goToOrder() { location.href = 'module_order.html'; }

// 키보드 방향키
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') goPrev();
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') goNext();
  if (e.key === 'Home') goPage(0);
  if (e.key === 'End') goPage(TOTAL);
});

// 모바일 스와이프
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) goPrev(); else goNext();
  }
});

updateImage();
</script>
</body>
</html>
